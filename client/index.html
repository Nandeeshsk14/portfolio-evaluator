<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default title + description (overridden per-page by React) -->
    <title>Developer Portfolio Evaluator</title>
    <meta name="description" content="Analyse any GitHub profile and get a detailed developer scorecard covering activity, code quality, diversity, community impact, and hiring readiness." />

    <!-- OpenGraph base tags (overridden dynamically for report pages) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Developer Portfolio Evaluator" />
    <meta property="og:title"       content="Developer Portfolio Evaluator" />
    <meta property="og:description" content="Analyse any GitHub profile and get a detailed scorecard." />
    <meta property="og:image"       content="/og-default.png" />

    <!-- Twitter card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Developer Portfolio Evaluator" />
    <meta name="twitter:description" content="Analyse any GitHub profile and get a detailed scorecard." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
